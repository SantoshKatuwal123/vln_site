<!DOCTYPE html>
<html>
<head>
    <title>Products - VulnShop</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav id="nav"></nav>
    <h2>Our Products</h2>
    <div style="margin-bottom: 20px;">
        <input type="text" id="search" placeholder="Search products..." style="width: 200px; display: inline;">
        <button onclick="search()" style="width: 100px; display: inline;">Search</button>
    </div>
    <div id="results-label"></div>
    <div id="product-list" class="product-grid"></div>

    <script src="/js/app.js"></script>
    <script>
        async function loadProducts(q = '') {
            const res = await fetch(`/api/products/search?q=${q}`);
            const data = await res.json();
            
            // Vulnerability: Reflected XSS
            document.getElementById('results-label').innerHTML = q ? `Showing results for: ${data.keyword}` : '';
            
            const list = document.getElementById('product-list');
            list.innerHTML = data.results.map(p => `
                <div class="card">
                    <h3>${p.name}</h3>
                    <p>${p.description}</p>
                    <p><strong>$${p.price}</strong></p>
                    <a href="product-detail.html?id=${p.id}">View Details</a>
                </div>
            `).join('');
        }

        function search() {
            const q = document.getElementById('search').value;
            loadProducts(q);
        }

        loadProducts();
    </script>
</body>
</html>
