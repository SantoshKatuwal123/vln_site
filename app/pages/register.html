<!DOCTYPE html>
<html>
<head>
    <title>Register - VulnShop</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav id="nav"></nav>
    <div class="card" style="max-width: 400px; margin: auto; margin-top: 50px;">
        <h2>Create Account</h2>
        <p>Join our "secure" shopping community.</p>
        
        <label>Email Address</label>
        <input type="email" id="email" placeholder="email@example.com">
        
        <label>Password</label>
        <input type="password" id="password" placeholder="Choose a password">
        
        <button onclick="register()">Register</button>
        
        <p style="margin-top: 15px;">
            Already have an account? <a href="login.html">Login here</a>
        </p>
        <div id="message" style="margin-top: 10px;"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        async function register() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            if (!email || !password) {
                messageDiv.innerHTML = '<span class="error">Please fill all fields</span>';
                return;
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    messageDiv.innerHTML = '<span style="color: green;">Registration successful! Redirecting...</span>';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    messageDiv.innerHTML = `<span class="error">Error: ${data.error}</span>`;
                }
            } catch (err) {
                messageDiv.innerHTML = '<span class="error">Server connection failed</span>';
            }
        }
    </script>
</body>
</html>
