<!DOCTYPE html>
<html>
<head>
    <title>Checkout - VulnShop</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav id="nav"></nav>
    <h2>Checkout</h2>
    <div class="card">
        <p>Your total is: <input type="number" id="finalPrice"></p>
        <p><small>(Vulnerability: You can change the price in the box above!)</small></p>
        <button onclick="pay()">Complete Purchase</button>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('finalPrice').value = localStorage.getItem('cartTotal');

        async function pay() {
            const total = document.getElementById('finalPrice').value;
            const res = await fetch('/api/cart/checkout', {
                method: 'POST',
                headers: API.getHeaders(),
                body: JSON.stringify({ items: [], total: parseFloat(total) })
            });
            const data = await res.json();
            alert(data.message + " Total charged: $" + data.charged);
            localStorage.removeItem('cart');
            window.location.href = 'orders.html';
        }
    </script>
</body>
</html>
