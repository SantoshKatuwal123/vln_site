<!DOCTYPE html>
<html>
<head>
    <title>Product Details - VulnShop</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav id="nav"></nav>
    <div id="detail" class="card"></div>
    
    <div class="card">
        <h3>Customer Reviews</h3>
        <div id="reviews"></div>
        <hr>
        <h4>Add a Review</h4>
        <textarea id="comment" style="width: 100%; height: 80px;" placeholder="Your thoughts..."></textarea>
        <button onclick="submitReview()">Submit Review</button>
    </div>

    <script src="/js/app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');

        async function loadData() {
            const pRes = await fetch(`/api/products/${productId}`);
            const p = await pRes.json();
            document.getElementById('detail').innerHTML = `
                <h2>${p.name}</h2>
                <p>${p.description}</p>
                <p>Price: $${p.price}</p>
                <button onclick="addToCart(${p.id}, '${p.name}', ${p.price})">Add to Cart</button>
            `;

            const rRes = await fetch(`/api/products/${productId}/reviews`);
            const reviews = await rRes.json();
            // Vulnerability: Stored XSS
            document.getElementById('reviews').innerHTML = reviews.map(r => `
                <div><strong>${r.user_email}:</strong> ${r.comment}</div>
            `).join('');
        }

        function addToCart(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.push({ id, name, price });
            localStorage.setItem('cart', JSON.stringify(cart));
            alert('Added!');
        }

        async function submitReview() {
            const user = JSON.parse(localStorage.getItem('user'));
            const comment = document.getElementById('comment').value;
            await fetch(`/api/products/${productId}/reviews`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: user.email, comment })
            });
            location.reload();
        }
        loadData();
    </script>
</body>
</html>
